<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Overlays -->
  <div id="grain"></div>
  <div id="vignette"></div>
  <div id="curtain"></div>

  <!-- Three.js canvas -->
  <div id="canvas-wrapper">
    <canvas id="scene"></canvas>
  </div>

  <!-- UI Layer -->
  <div id="ui">
    <div id="wordmark">
      <span class="the">THE</span>
      <span class="library">LIBRARY</span>
    </div>

    <nav id="nav">
      <a href="#">Works</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>

    <div id="scroll-hint">
      <div class="line"></div>
      <span>scroll to enter</span>
    </div>

    <div id="tooltip"></div>
    <div id="phase-label"></div>
    <div id="progress-bar"></div>

    <div id="instructions">
      <h1>THE<br />LIBRARY</h1>
      <p>scroll to enter</p>
    </div>
  </div>

  <!-- Three.js r128 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

  <!-- Scene modules (load order matters) -->
  <script src="src/config.js"></script>
  <script src="src/helpers.js"></script>
  <script src="src/input.js"></script>
  <script src="src/scene/exterior.js"></script>
  <script src="src/scene/interior.js"></script>
  <script src="src/scene/nodes.js"></script>
  <script src="src/main.js"></script>

</body>
</html>
